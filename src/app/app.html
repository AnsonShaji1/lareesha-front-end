<div class="app">
  <app-header
    (searchClick)="openSearch()"
    (signInClick)="openSignIn()"
    (signUpClick)="openSignUp()"
    (cartClick)="openCart()"
  >
  </app-header>
  <main class="app-main">
    <router-outlet></router-outlet>
  </main>
  <app-site-footer></app-site-footer>
  <app-search-modal [isOpen]="isSearchOpen" (closeModal)="closeSearch()"> </app-search-modal>
  <app-auth-modal
    [isOpen]="isAuthModalOpen"
    [mode]="authMode"
    (closeModal)="closeAuthModal()"
    (authenticated)="onAuthenticated($event)"
    (forgotPassword)="openForgotPassword()"
  >
  </app-auth-modal>
  <app-forgot-password-modal
    [isOpen]="isForgotPasswordOpen"
    (closeModal)="closeForgotPassword()"
    (backToSignIn)="backToSignIn()"
  >
  </app-forgot-password-modal>
  <app-cart-drawer
    [isOpen]="isCartOpen"
    (closeDrawer)="closeCart()"
    (checkoutRequested)="goToCheckout()"
    (authRequired)="handleAuthRequired()"
  >
  </app-cart-drawer>
</div>
